<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: linear-gradient(135deg, #1B4F72 0%, #2E86AB 100%);
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.title-box {
  text-align: center;
  padding: 40pt;
}
h1 {
  color: #FFFFFF;
  font-size: 36pt;
  margin: 0 0 15pt 0;
  font-weight: bold;
}
h2 {
  color: #E8F4F8;
  font-size: 22pt;
  margin: 0 0 30pt 0;
  font-weight: normal;
}
.subtitle {
  color: #B8D4E3;
  font-size: 14pt;
  margin-top: 40pt;
}
.accent-line {
  width: 120pt;
  height: 4pt;
  background: #27AE60;
  margin: 20pt auto;
  border-radius: 2pt;
}
</style>
</head>
<body>
<div class="title-box">
  <h1>Baseload PPA Analysis</h1>
  <div class="accent-line"></div>
  <h2>Solar + Wind + Battery Energy Storage</h2>
  <p class="subtitle">SE3 Sweden | 2024 Analysis | 1 MW Solar + 1 MW Wind</p>
</div>
</body>
</html>
